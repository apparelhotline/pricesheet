<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Order &amp; Shipment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ---------- Light (default, editorial b/w) ---------- */
  :root{
    --bg:#ffffff; --bg-2:#f4f4f4; --card:#ffffff;
    --ink:#000000; --ink-2:#333333; --muted:#777777;
    --hair:#e6e6e6; --hair-strong:#000000;
    --accent:#000000; --accent-ink:#ffffff;
    --chip:#f0f0f0; --chip-ink:#222222;
    --good:#0a7d2c; --good-bg:#e7f6ec;
    --transit:#1452c9; --transit-bg:#e6efff;
    --warn:#b25b00; --warn-bg:#fdeddd;
    --bad:#b81c1c; --bad-bg:#fdebeb;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.04);
    --font-display:"Space Grotesk","Inter",system-ui,sans-serif;
    --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  /* ---------- Dark ---------- */
  [data-theme="dark"]{
    --bg:#0d0e10; --bg-2:#16181c; --card:#16181c;
    --ink:#f3f4f6; --ink-2:#c8ccd2; --muted:#8b919b;
    --hair:#262a30; --hair-strong:#3a3f47;
    --accent:#f3f4f6; --accent-ink:#0d0e10;
    --chip:#22262c; --chip-ink:#d4d8de;
    --good:#54d486; --good-bg:#10371f;
    --transit:#74a4ff; --transit-bg:#13233f;
    --warn:#f0a85a; --warn-bg:#3a2811;
    --bad:#f08a8a; --bad-bg:#3a1717;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--font-sans); line-height:1.45;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:1100px; margin:0 auto; padding:24px 20px 64px}
  a{color:inherit}

  /* Header */
  header.top{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:8px}
  h1{font-family:var(--font-display); font-weight:700; letter-spacing:-.02em; font-size:clamp(22px,4vw,32px); margin:0}
  .sub{color:var(--muted); font-size:13px; margin-top:4px}
  .sub b{color:var(--ink-2); font-weight:600}
  .toggle{
    display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
    border:1px solid var(--hair-strong); background:var(--card); color:var(--ink);
    border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600;
    font-family:var(--font-display);
  }
  .toggle:hover{background:var(--bg-2)}
  .toggle svg{width:16px; height:16px}

  /* Stat cards */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:22px 0 26px}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{
    background:var(--card); border:1px solid var(--hair); border-radius:14px;
    padding:14px 16px; box-shadow:var(--shadow);
  }
  .stat .n{font-family:var(--font-display); font-weight:700; font-size:26px; letter-spacing:-.02em}
  .stat .l{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.06em; margin-top:2px}

  /* Controls */
  .controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px}
  .controls input,.controls select{
    font:inherit; color:var(--ink); background:var(--card);
    border:1px solid var(--hair-strong); border-radius:10px; padding:9px 12px;
  }
  .controls input{flex:1; min-width:180px}
  .controls input::placeholder{color:var(--muted)}

  /* Order card */
  .order{
    background:var(--card); border:1px solid var(--hair); border-radius:14px;
    padding:0; margin-bottom:14px; box-shadow:var(--shadow);
    transition:border-color .2s, box-shadow .2s;
  }
  .order.open{border-color:var(--hair-strong)}
  .order-head{
    display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;
    padding:16px 18px 0; cursor:pointer; user-select:none;
  }
  .order-id{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
  .order-num{font-family:var(--font-mono); font-weight:600; font-size:16px}
  .vendor{font-family:var(--font-display); font-weight:600; font-size:15px}
  .head-right{display:flex; align-items:center; gap:10px}
  .chev{
    width:18px; height:18px; flex:none; color:var(--muted);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .order.open .chev{transform:rotate(90deg); color:var(--ink)}

  .meta{display:flex; gap:14px 22px; flex-wrap:wrap; color:var(--ink-2); font-size:13px; padding:10px 18px 0}
  .meta span{color:var(--muted)}
  .meta b{font-weight:600; color:var(--ink)}

  /* Always-visible summary bar */
  .summary{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:12px 18px 16px; color:var(--muted); font-size:12.5px;
  }
  .summary .pkg{display:inline-flex; align-items:center; gap:6px; font-weight:600; color:var(--ink-2)}
  .summary .pkg svg{width:14px; height:14px}
  .summary .hint{color:var(--muted)}
  .order.open .summary .hint{opacity:.55}
  .summary .no-ship{font-style:italic}
  .summary .deliv-today{
    display:inline-flex; align-items:center; font-size:11px; font-weight:600;
    font-family:var(--font-display); color:var(--good); background:var(--good-bg);
    padding:2px 9px; border-radius:999px; margin-right:2px;
  }

  .badge{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
    padding:3px 10px; border-radius:999px; font-family:var(--font-display); white-space:nowrap;
  }
  .badge::before{content:""; width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.9}
  .b-shipped,.b-intransit{color:var(--transit); background:var(--transit-bg)}
  .b-delivered{color:var(--good); background:var(--good-bg)}
  .b-inprogress{color:var(--warn); background:var(--warn-bg)}
  .b-backordered{color:var(--bad); background:var(--bad-bg)}
  .b-default{color:var(--chip-ink); background:var(--chip)}

  /* Accordion expand region (animated, content-height-agnostic) */
  .expand{display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1)}
  .order.open .expand{grid-template-rows:1fr}
  .expand-inner{overflow:hidden; min-height:0}
  .expand-pad{
    padding:0 18px 16px; margin-top:2px;
    border-top:1px dashed var(--hair);
  }
  .expand-pad-top{padding-top:14px}
  @media (prefers-reduced-motion: reduce){ .expand{transition:none} .chev{transition:none} }

  /* Shipment detail cards inside the expand */
  .ship-card{
    background:var(--bg-2); border:1px solid var(--hair); border-radius:12px;
    padding:12px 14px; margin-top:10px;
  }
  .ship-card:first-child{margin-top:0}
  .ship-top{display:flex; align-items:center; justify-content:space-between; gap:10px 14px; flex-wrap:wrap}
  .ship-top .left{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .track{font-family:var(--font-mono); font-size:13px; font-weight:500; text-decoration:none; border-bottom:1px solid var(--hair-strong)}
  .track:hover{opacity:.7}
  .carrier{font-weight:600; color:var(--ink-2); font-size:12.5px}
  .ship-top .when{color:var(--muted); font-size:12px}

  .items{margin-top:10px; display:flex; flex-direction:column; gap:6px}
  .item{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:7px 11px; background:var(--card); border:1px solid var(--hair); border-radius:9px;
  }
  .item .iname{font-size:13px; color:var(--ink); font-weight:500}
  .item .iqty{
    font-family:var(--font-mono); font-size:12px; font-weight:600;
    color:var(--chip-ink); background:var(--chip);
    padding:2px 9px; border-radius:999px; white-space:nowrap; flex:none;
  }
  .item-note{font-size:12.5px; color:var(--muted); padding:2px 2px}
  .ship-empty{font-size:12.5px; color:var(--muted); font-style:italic; margin-top:8px}

  /* Order-level detail grid in expand */
  .detail-grid{display:flex; gap:14px 26px; flex-wrap:wrap; padding-top:4px}
  .detail-grid .d{font-size:13px; color:var(--ink-2)}
  .detail-grid .d span{color:var(--muted)}
  .detail-grid .d b{font-weight:600; color:var(--ink)}

  /* Delivered / completed section */
  .delivered-wrap{margin-top:34px}
  .delivered-head{
    display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
    padding:14px 16px; border:1px solid var(--hair); border-radius:14px;
    background:var(--bg-2); color:var(--ink-2);
  }
  .delivered-head .chev{color:var(--muted)}
  .delivered-wrap.open .delivered-head .chev{transform:rotate(90deg)}
  .delivered-head .dtitle{font-family:var(--font-display); font-weight:600; font-size:15px; color:var(--ink)}
  .delivered-head .dcount{
    font-size:12px; font-weight:600; color:var(--good); background:var(--good-bg);
    padding:2px 10px; border-radius:999px; font-family:var(--font-display);
  }
  .delivered-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1)}
  .delivered-wrap.open .delivered-body{grid-template-rows:1fr}
  .delivered-body-inner{overflow:hidden; min-height:0}
  .delivered-list{padding-top:14px; opacity:.82}
  .delivered-list .order{background:var(--bg-2)}
  .delivered-list .order-num,.delivered-list .vendor{color:var(--ink-2)}

  .empty,.err{text-align:center; color:var(--muted); padding:60px 20px; font-size:15px}
  .err{color:var(--bad)}
  footer{margin-top:34px; color:var(--muted); font-size:12px; text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Order &amp; Shipment Tracker</h1>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <button class="toggle" id="themeBtn" type="button" aria-label="Toggle light/dark theme"></button>
  </header>

  <section class="stats" id="stats" hidden>
    <div class="stat"><div class="n" id="s-orders">–</div><div class="l">Orders</div></div>
    <div class="stat"><div class="n" id="s-transit">–</div><div class="l">In transit</div></div>
    <div class="stat"><div class="n" id="s-vendors">–</div><div class="l">Vendors</div></div>
    <div class="stat"><div class="n" id="s-back">–</div><div class="l">Backordered</div></div>
  </section>

  <section class="controls" id="controls" hidden>
    <input type="search" id="q" placeholder="Search order #, vendor, tracking…">
    <select id="vendor"><option value="">All vendors</option></select>
    <select id="status"><option value="">All statuses</option></select>
  </section>

  <main id="list"><div class="empty">Loading orders…</div></main>

  <section class="delivered-wrap" id="deliveredWrap" hidden>
    <div class="delivered-head" id="deliveredHead" role="button" tabindex="0" aria-expanded="false">
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      <span class="dtitle">Delivered</span>
      <span class="dcount" id="deliveredCount">0</span>
    </div>
    <div class="delivered-body"><div class="delivered-body-inner">
      <div class="delivered-list" id="deliveredList"></div>
    </div></div>
  </section>

  <footer id="foot"></footer>
</div>

<script>
(function(){
  // ---------- Theme: system default + manual toggle, persisted ----------
  var root = document.documentElement, btn = document.getElementById('themeBtn');
  var SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';
  var MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  function apply(t){
    root.setAttribute('data-theme', t);
    btn.innerHTML = (t==='dark' ? SUN : MOON) + '<span>' + (t==='dark'?'Light':'Dark') + '</span>';
  }
  var saved = null; try{ saved = localStorage.getItem('ost-theme'); }catch(e){}
  var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  apply(saved || (prefersDark ? 'dark' : 'light'));
  btn.addEventListener('click', function(){
    var next = root.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    apply(next); try{ localStorage.setItem('ost-theme', next); }catch(e){}
  });

  // ---------- Data ----------
  var ALL = [];
  var elList = document.getElementById('list');
  var elDeliveredWrap = document.getElementById('deliveredWrap');
  var elDeliveredList = document.getElementById('deliveredList');
  var elDeliveredCount = document.getElementById('deliveredCount');
  var elDeliveredHead = document.getElementById('deliveredHead');
  var elQ = document.getElementById('q'), elVendor = document.getElementById('vendor'), elStatus = document.getElementById('status');
  var OPEN = {};            // expanded order ids (persist across re-renders)
  var CHEV = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function badgeClass(s){
    var k = String(s||'').toLowerCase().replace(/[^a-z]/g,'');
    if(k.indexOf('deliver')>-1) return 'b-delivered';
    if(k.indexOf('transit')>-1) return 'b-intransit';
    if(k.indexOf('ship')>-1) return 'b-shipped';
    if(k.indexOf('progress')>-1) return 'b-inprogress';
    if(k.indexOf('backorder')>-1) return 'b-backordered';
    return 'b-default';
  }
  function trackUrl(carrier, t){
    var c = String(carrier||'').toLowerCase();
    if(c.indexOf('ups')>-1) return 'https://www.ups.com/track?loc=en_US&tracknum=' + encodeURIComponent(t);
    if(c.indexOf('fedex')>-1) return 'https://www.fedex.com/fedextrack/?trknbr=' + encodeURIComponent(t);
    if(c.indexOf('usps')>-1) return 'https://tools.usps.com/go/TrackConfirmAction?tLabels=' + encodeURIComponent(t);
    if(c.indexOf('dhl')>-1) return 'https://www.dhl.com/us-en/home/tracking.html?tracking-id=' + encodeURIComponent(t);
    return null;
  }
  function fmtMoney(n){ return n==null ? '' : '$' + Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }

  // ---- order classification + sort ----
  function pad2(n){ return (n<10?'0':'')+n; }
  function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }

  function isDelivered(o){
    if(/deliver/i.test(o.status||'')) return true;
    var sh = o.shipments||[];
    return sh.length>0 && sh.every(function(s){ return /deliver/i.test(s.status||''); });
  }
  // Best-known delivery date as YYYY-MM-DD (or '' if unknown).
  function deliveredOn(o){
    if(!isDelivered(o)) return '';
    var best = '';
    (o.shipments||[]).forEach(function(s){
      if(/deliver/i.test(s.status||'')){
        var dt = String(s.deliveredDate || s.estDelivery || '').slice(0,10);
        if(dt && dt>best) best = dt;
      }
    });
    if(!best && o.lastUpdated) best = String(o.lastUpdated).slice(0,10);
    return best;
  }
  // Delivered before today → archive to the Delivered section.
  // Delivered today (or unknown date) → keep in the main list with a Delivered badge.
  function deliveredEarlier(o){
    if(!isDelivered(o)) return false;
    var d = deliveredOn(o);
    return !!d && d < todayStr();
  }
  function deliveredToday(o){ return isDelivered(o) && !deliveredEarlier(o); }

  function hasTracking(o){ return (o.shipments||[]).some(function(s){ return s.tracking; }); }
  function latestShipDate(o){
    var d = '';
    (o.shipments||[]).forEach(function(s){ if(s.shipDate && s.shipDate>d) d=s.shipDate; });
    return d;
  }
  // Lower bucket = higher in the "arriving first" list.
  function bucket(o){
    if(deliveredToday(o)) return 5;              // arrived today — done, sits at the bottom until tomorrow
    var st = (o.status||'').toLowerCase();
    if(/backorder/.test(st)) return 4;           // not arriving — sink toward bottom
    if(hasTracking(o)) return 0;                 // shipped + tracking → closest to delivery
    if(/transit|ship/.test(st)) return 1;        // marked shipped but no tracking yet
    if(/progress/.test(st)) return 2;            // not yet shipped
    return 3;                                     // anything else
  }
  function sortKeyDate(o){ return latestShipDate(o) || o.orderDate || ''; }
  function sortActive(a,b){
    var ba=bucket(a), bb=bucket(b);
    if(ba!==bb) return ba-bb;
    var da=sortKeyDate(a), db=sortKeyDate(b);
    if(da!==db) return da<db ? 1 : -1;           // most recent first
    return String(a.orderNumber).localeCompare(String(b.orderNumber));
  }

  // ---- parse a free-text "contents" string into item rows ----
  // e.g. "31-069 Nvy/Wht x40; 39-165 Navy x150"  →  [{name:"31-069 Nvy/Wht", qty:"40"}, ...]
  function parseContents(str){
    if(!str) return [];
    return str.split(/;|•|\n/).map(function(part){
      part = part.trim();
      if(!part) return null;
      var m = part.match(/x\s*([\d,]+)\s*$/i);
      if(m){
        var name = part.slice(0, m.index).replace(/[–—\-:\s]+$/,'').trim();
        return {name:name||part, qty:m[1]};
      }
      return {name:part, qty:null};
    }).filter(Boolean);
  }

  function shipCardHtml(s){
    var url = trackUrl(s.carrier, s.tracking);
    var tn = s.tracking
      ? (url ? '<a class="track" href="'+url+'" target="_blank" rel="noopener">'+esc(s.tracking)+'</a>'
             : '<span class="track">'+esc(s.tracking)+'</span>')
      : '<span class="carrier">Tracking pending</span>';
    var when = s.shipDate ? 'Shipped '+esc(s.shipDate) : '';
    if(s.estDelivery) when += (when?' · ':'') + 'ETA '+esc(s.estDelivery);

    var items = parseContents(s.contents);
    var itemsHtml;
    if(items.length){
      itemsHtml = '<div class="items">'+items.map(function(it){
        return '<div class="item"><span class="iname">'+esc(it.name)+'</span>'+
               (it.qty ? '<span class="iqty">×'+esc(it.qty)+'</span>' : '')+'</div>';
      }).join('')+'</div>';
    } else if(s.contents){
      itemsHtml = '<div class="ship-empty">'+esc(s.contents)+'</div>';
    } else {
      itemsHtml = '<div class="ship-empty">No item details on this package.</div>';
    }

    return '<div class="ship-card">'+
      '<div class="ship-top"><div class="left">'+tn+
        (s.carrier?'<span class="carrier">'+esc(s.carrier)+'</span>':'')+
        '<span class="badge '+badgeClass(s.status)+'">'+esc(s.status||'—')+'</span>'+
      '</div>'+(when?'<span class="when">'+when+'</span>':'')+'</div>'+
      itemsHtml+
    '</div>';
  }

  function orderHtml(o){
    var open = !!OPEN[o.id];
    var ships = o.shipments||[];
    var count = ships.length;
    var done = isDelivered(o);
    var dispStatus = done ? 'Delivered' : (o.status||'—');
    var dispClass  = done ? 'b-delivered' : badgeClass(o.status);

    var pkgLine = count
      ? '<span class="pkg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>'+
          count+' shipment'+(count>1?'s':'')+'</span>'+
          '<span class="hint">· tap to view contents</span>'
      : '<span class="no-ship">No shipments yet</span>';
    var summary = (deliveredToday(o) ? '<span class="deliv-today">Delivered today</span>' : '') + pkgLine;

    // order-level detail line (inside expand)
    var detail = '<div class="detail-grid">'+
      (o.vendorSO?'<div class="d"><span>Ref </span><b>'+esc(o.vendorSO)+'</b></div>':'')+
      (o.orderTotal!=null?'<div class="d"><span>Total </span><b>'+esc(fmtMoney(o.orderTotal))+'</b></div>':'')+
      (o.totalPieces!=null?'<div class="d"><span>Pieces </span><b>'+esc(o.totalPieces)+'</b></div>':'')+
      (o.carrier?'<div class="d"><span>Carrier </span><b>'+esc(o.carrier)+'</b></div>':'')+
      (o.source?'<div class="d"><span>Source </span><b>'+esc(o.source)+'</b></div>':'')+
      (o.expectedDelivery?'<div class="d"><span>Expected </span><b>'+esc(o.expectedDelivery)+'</b></div>':'')+
    '</div>';

    var shipsHtml = count
      ? ships.map(shipCardHtml).join('')
      : '<div class="ship-empty">This order hasn’t shipped yet — no packages to show.</div>';

    return '<article class="order'+(open?' open':'')+'" data-id="'+esc(o.id)+'">'+
      '<div class="order-head" role="button" tabindex="0" aria-expanded="'+(open?'true':'false')+'">'+
        '<div class="order-id"><span class="order-num">'+esc(o.orderNumber)+'</span>'+
          '<span class="vendor">'+esc(o.vendor||'—')+'</span></div>'+
        '<div class="head-right">'+
          '<span class="badge '+dispClass+'">'+esc(dispStatus)+'</span>'+
          CHEV+
        '</div>'+
      '</div>'+
      '<div class="meta">'+
        (o.orderDate?'<div><span>Ordered </span><b>'+esc(o.orderDate)+'</b></div>':'')+
        (o.totalPieces!=null?'<div><span>Pieces </span><b>'+esc(o.totalPieces)+'</b></div>':'')+
        (o.orderTotal!=null?'<div><span>Total </span><b>'+esc(fmtMoney(o.orderTotal))+'</b></div>':'')+
      '</div>'+
      '<div class="summary">'+summary+'</div>'+
      '<div class="expand"><div class="expand-inner"><div class="expand-pad expand-pad-top">'+
        detail+ shipsHtml+
      '</div></div></div>'+
    '</article>';
  }

  function render(rows){
    // Delivered-earlier (before today) → Delivered section.
    // Everything else, including delivered-today, stays in the active list.
    var active = [], delivered = [];
    rows.forEach(function(o){ (deliveredEarlier(o)?delivered:active).push(o); });

    active.sort(sortActive);
    delivered.sort(function(a,b){
      var da=deliveredOn(a)||sortKeyDate(a), db=deliveredOn(b)||sortKeyDate(b);
      return da<db ? 1 : (da>db ? -1 : 0);   // most recently delivered first
    });

    elList.innerHTML = active.length
      ? active.map(orderHtml).join('')
      : '<div class="empty">No active orders match your filters.</div>';

    if(delivered.length){
      elDeliveredWrap.hidden = false;
      elDeliveredCount.textContent = delivered.length;
      elDeliveredList.innerHTML = delivered.map(orderHtml).join('');
    } else {
      elDeliveredWrap.hidden = true;
      elDeliveredList.innerHTML = '';
    }
  }

  // ---- accordion: toggle a card open/closed ----
  function toggleCard(art){
    var id = art.getAttribute('data-id');
    var nowOpen = !art.classList.contains('open');
    if(nowOpen) OPEN[id]=1; else delete OPEN[id];
    art.classList.toggle('open', nowOpen);
    var head = art.querySelector('.order-head');
    if(head) head.setAttribute('aria-expanded', nowOpen?'true':'false');
  }
  function cardClickHandler(e){
    if(e.target.closest('a')) return;            // let tracking links work
    var head = e.target.closest('.order-head');
    if(!head) return;
    toggleCard(head.closest('.order'));
  }
  elList.addEventListener('click', cardClickHandler);
  elDeliveredList.addEventListener('click', cardClickHandler);
  // keyboard support for card headers
  function cardKeyHandler(e){
    if(e.key!=='Enter' && e.key!==' ') return;
    var head = e.target.closest('.order-head');
    if(!head) return;
    e.preventDefault();
    toggleCard(head.closest('.order'));
  }
  elList.addEventListener('keydown', cardKeyHandler);
  elDeliveredList.addEventListener('keydown', cardKeyHandler);

  // Delivered section collapse (collapsed by default)
  function toggleDelivered(){
    var open = elDeliveredWrap.classList.toggle('open');
    elDeliveredHead.setAttribute('aria-expanded', open?'true':'false');
  }
  elDeliveredHead.addEventListener('click', toggleDelivered);
  elDeliveredHead.addEventListener('keydown', function(e){
    if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleDelivered(); }
  });

  function applyFilters(){
    var q = elQ.value.trim().toLowerCase(), v = elVendor.value, st = elStatus.value;
    render(ALL.filter(function(o){
      if(v && o.vendor!==v) return false;
      if(st && o.status!==st) return false;
      if(q){
        var hay = [o.orderNumber,o.vendor,o.vendorSO,o.status].join(' ').toLowerCase();
        var inShip = (o.shipments||[]).some(function(s){
          return String(s.tracking||'').toLowerCase().indexOf(q)>-1 ||
                 String(s.contents||'').toLowerCase().indexOf(q)>-1;
        });
        if(hay.indexOf(q)===-1 && !inShip) return false;
      }
      return true;
    }));
  }
  [elQ,elVendor,elStatus].forEach(function(el){ el.addEventListener('input', applyFilters); });

  function uniqSorted(arr){ return arr.filter(function(x,i){return x && arr.indexOf(x)===i;}).sort(); }

  fetch('orders.json', {cache:'no-store'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
  }).then(function(d){
    ALL = d.orders || [];
    var transit = 0, back = 0, vendors = {};
    ALL.forEach(function(o){
      if(o.vendor) vendors[o.vendor]=1;
      if(/backorder/i.test(o.status||'')) back++;
      (o.shipments||[]).forEach(function(s){ if(/transit/i.test(s.status||'')) transit++; });
    });
    document.getElementById('s-orders').textContent = ALL.length;
    document.getElementById('s-transit').textContent = transit;
    document.getElementById('s-vendors').textContent = Object.keys(vendors).length;
    document.getElementById('s-back').textContent = back;
    document.getElementById('stats').hidden = false;
    document.getElementById('controls').hidden = false;

    uniqSorted(ALL.map(function(o){return o.vendor;})).forEach(function(v){
      var o=document.createElement('option'); o.value=o.textContent=v; elVendor.appendChild(o);
    });
    uniqSorted(ALL.map(function(o){return o.status;})).forEach(function(s){
      var o=document.createElement('option'); o.value=o.textContent=s; elStatus.appendChild(o);
    });

    var when = d.updated ? new Date(d.updated) : null;
    document.getElementById('sub').innerHTML = '<b>'+(d.source||'Vendor orders')+'</b>'+
      (when ? ' · updated ' + when.toLocaleString() : '');
    document.getElementById('foot').textContent = 'Live snapshot from Airtable, synced to GitHub. Tap any order to see what’s in the box. Tracking numbers link to the carrier.';
    render(ALL);
  }).catch(function(e){
    elList.innerHTML = '<div class="err">Couldn’t load orders.json — '+esc(e.message)+'</div>';
    document.getElementById('sub').textContent = 'Failed to load data';
  });
})();
</script>
</body>
</html>
